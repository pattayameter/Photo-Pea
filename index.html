<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo-Pea ตรวจเลขก่อน Upload</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest"></script>
<style>
body{margin:0;padding:20px;background:#081225;color:white;font-family:Arial,sans-serif}
.wrap{max-width:1100px;margin:auto}
.pick{display:block;background:#0ea5e9;padding:18px;border-radius:14px;text-align:center;font-weight:bold;cursor:pointer;margin:20px 0}
input[type=file]{display:none}
button{border:0;border-radius:12px;padding:13px 18px;color:white;cursor:pointer;background:#2563eb;margin-right:8px}
button:disabled{opacity:.45}
#uploadBtn{background:#7c3aed}
.status{color:#cbd5e1;font-size:13px;margin:14px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;overflow:hidden}
.preview{width:100%;height:320px;object-fit:contain;background:black;padding:8px;cursor:zoom-in}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:none;align-items:center;justify-content:center;padding:18px}
.lightbox.on{display:flex}
.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:8px;background:#000}
.lightboxClose{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:50%;background:rgba(15,23,42,.92);border:1px solid rgba(255,255,255,.24);color:#fff;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;margin:0}
.lightboxClose:hover{background:#1e293b}
.body{padding:14px}
.row{display:grid;grid-template-columns:90px 1fr;gap:8px;margin:7px 0;font-size:14px}
.label{color:#94a3b8}
.peaInput{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#020617;color:white;font-size:18px;margin-top:8px}
.tag{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:bold}
.ok{color:#22c55e;background:rgba(34,197,94,.12)}
.warn{color:#f59e0b;background:rgba(245,158,11,.12)}
.bad{color:#ef4444;background:rgba(239,68,68,.12)}
.candidates{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.cand{background:#020617;border:1px solid #334155;color:#cbd5e1;padding:6px 9px;border-radius:999px;font-size:12px}
.uploadState{margin-top:10px;color:#cbd5e1;font-size:13px}
.grid{grid-template-columns:repeat(auto-fit,minmax(340px,1fr));align-items:stretch}
.card{display:flex;flex-direction:column;min-height:620px}
.preview{height:330px;display:block;border-bottom:1px solid #334155}
.body{display:flex;flex:1;flex-direction:column;gap:10px;padding:14px 16px 16px}
.details{display:grid;gap:6px}
.row{grid-template-columns:90px minmax(0,1fr);align-items:start;margin:0;min-height:22px}
.row>div:last-child{min-width:0;overflow-wrap:anywhere;font-weight:600}
.chooseBlock{margin-top:auto;display:grid;gap:8px;padding-top:4px}
.chooseTitle{color:#cbd5e1;font-size:14px}
.candidates{min-height:32px;margin-top:0;align-content:flex-start}
.cand{margin:0;min-height:30px;display:inline-flex;align-items:center}
.peaInput{margin-top:0;height:48px;font-weight:700;font-family:Arial,sans-serif}
.uploadState{min-height:22px;margin-top:2px;display:flex;align-items:center}
@media(max-width:760px){body{padding:12px}.grid{grid-template-columns:1fr}.card{min-height:0}.preview{height:360px}}
</style>
</head>
<body>
<div class="wrap">
<h1>📸 Photo-Pea ตรวจเลขก่อน Upload</h1>
<div class="status">เลือกรูป → อ่านเลข → ตรวจ/แก้เลข PEA ก่อน → Upload เข้า Google Drive + Sheet2</div>

<label class="pick" for="files">📷 เลือกรูปจาก iPad / Photos</label>
<input id="files" type="file" multiple accept="image/*">

<button id="scanBtn" disabled>🔍 อ่าน Barcode/OCR</button>
<button id="uploadBtn" disabled>☁️ Upload เข้า Drive + Sheet2</button>

<div class="status" id="mainStatus">ยังไม่ได้เลือกรูป</div>
<div class="grid" id="grid"></div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightboxClose" type="button" onclick="closeLightbox(event)">&times;</button>
  <img id="lightboxImg" src="" alt="รูปขยาย">
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwC7mcaW9ehDiJrCuP7ADQFRFrPKSAWp6BYkI9_WEO6EMpgzlin6WH4sZVRGyqdpYqS/exec";
const filesInput = document.getElementById('files');
const scanBtn = document.getElementById('scanBtn');
const uploadBtn = document.getElementById('uploadBtn');
const grid = document.getElementById('grid');
const mainStatus = document.getElementById('mainStatus');

let files = [];
let results = [];

filesInput.addEventListener('change', () => {
  files = [...filesInput.files];
  results = [];
  grid.innerHTML = '';
  scanBtn.disabled = files.length === 0;
  uploadBtn.disabled = true;
  mainStatus.textContent = files.length ? `เลือกแล้ว ${files.length} รูป` : 'ยังไม่ได้เลือกรูป';
});

function numberCandidates(text) {
  const compact = String(text || '').replace(/(?<=\d)\s+(?=\d)/g, '');
  const nums = compact.match(/\b\d{8,12}\b/g) || [];
  const uniq = [...new Set(nums)];
  uniq.sort((a,b) => {
    if (a.length === 10 && b.length !== 10) return -1;
    if (b.length === 10 && a.length !== 10) return 1;
    return b.length - a.length;
  });
  return uniq;
}

function clean(v) { return String(v || '').replace(/\D/g, '').slice(0, 12); }

function makeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function canvasFromImage(img, crop) {
  const sx = crop.x * img.naturalWidth;
  const sy = crop.y * img.naturalHeight;
  const sw = crop.w * img.naturalWidth;
  const sh = crop.h * img.naturalHeight;
  const maxSide = 1800;
  const scale = Math.min(1, maxSide / Math.max(sw, sh));
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(sw * scale);
  canvas.height = Math.round(sh * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  return canvas;
}

async function readBarcode(file) {
  try {
    const reader = new ZXingBrowser.BrowserMultiFormatReader();
    const url = URL.createObjectURL(file);
    const res = await reader.decodeFromImageUrl(url);
    URL.revokeObjectURL(url);
    return numberCandidates(res.getText())[0] || '';
  } catch(e) {
    return '';
  }
}

async function readOCR(file) {
  const img = await makeImage(file);
  const crops = [
    {x:0, y:0, w:1, h:.45},
    {x:0, y:.35, w:1, h:.35},
    {x:0, y:0, w:1, h:1}
  ];

  let all = [];
  for (const crop of crops) {
    try {
      const canvas = canvasFromImage(img, crop);
      const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789PEApea'
      });
      all.push(...numberCandidates(text));
    } catch(e) {}
  }

  const counts = {};
  all.forEach(n => counts[n] = (counts[n] || 0) + 1);

  const sorted = Object.keys(counts).sort((a,b) => {
    if (counts[b] !== counts[a]) return counts[b] - counts[a];
    if (a.length === 10 && b.length !== 10) return -1;
    if (b.length === 10 && a.length !== 10) return 1;
    return b.length - a.length;
  });

  return {
    best: sorted[0] || '',
    candidates: sorted.slice(0, 5)
  };
}

function decide(barcode, ocr) {
  if (barcode && ocr && barcode === ocr) return { final:barcode, text:'OK ตรงกัน', cls:'ok' };
  if (barcode && !ocr) return { final:barcode, text:'ใช้ Barcode', cls:'ok' };
  if (barcode && ocr && barcode !== ocr) return { final:barcode, text:'เลขไม่ตรง ตรวจเอง', cls:'warn' };
  if (!barcode && ocr) return { final:ocr, text:'OCR อย่างเดียว ตรวจเอง', cls:'warn' };
  return { final:'', text:'อ่านไม่ได้ ต้องกรอกเอง', cls:'bad' };
}

function renderCard(r) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-' + r.idx;
  const cands = [r.barcode, r.ocr, ...r.candidates].filter(Boolean).filter((v,i,a) => a.indexOf(v) === i);

  div.innerHTML = `
    <img class="preview" src="${r.preview}" alt="${r.file.name}" onclick="openLightboxByIndex(${r.idx})">
    <div class="body">
      <div class="details">
        <div class="row"><div class="label">ไฟล์เดิม</div><div>${r.file.name}</div></div>
        <div class="row"><div class="label">Barcode</div><div>${r.barcode || '-'}</div></div>
        <div class="row"><div class="label">OCR</div><div>${r.ocr || '-'}</div></div>
        <div class="row"><div class="label">สถานะ</div><div><span class="tag ${r.cls}">${r.status}</span></div></div>
      </div>
      <div class="chooseBlock">
        <div class="chooseTitle">เลือกเลข หรือแก้เองก่อน Upload</div>
        <div class="candidates">
          ${cands.map(n => `<button class="cand" onclick="setPea(${r.idx}, '${n}')">${n}</button>`).join('')}
        </div>
        <input class="peaInput" id="pea-${r.idx}" value="${r.final}" placeholder="ใส่เลข PEA">
        <div class="uploadState" id="up-${r.idx}">ยังไม่ได้ Upload</div>
      </div>
    </div>
  `;
  grid.appendChild(div);
}

function setPea(idx, pea) {
  const input = document.getElementById('pea-' + idx);
  if (input) input.value = pea;
}

function openLightboxByIndex(idx) {
  const r = results.find(item => item.idx === idx);
  if (!r) return;
  const box = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = r.preview;
  img.alt = r.file.name;
  box.classList.add('on');
}

function closeLightbox(event) {
  if (event) event.stopPropagation();
  const box = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  box.classList.remove('on');
  img.src = '';
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeLightbox();
});

scanBtn.addEventListener('click', async () => {
  results = [];
  grid.innerHTML = '';
  uploadBtn.disabled = true;

  for (let i = 0; i < files.length; i++) {
    mainStatus.textContent = `กำลังอ่าน ${i+1}/${files.length}`;
    const file = files[i];
    const preview = URL.createObjectURL(file);
    const barcode = await readBarcode(file);
    const ocrData = await readOCR(file);
    const d = decide(barcode, ocrData.best);

    const r = {
      idx: i, file, preview, barcode, ocr: ocrData.best,
      candidates: ocrData.candidates, final: d.final,
      status: d.text, cls: d.cls
    };

    results.push(r);
    renderCard(r);
  }

  mainStatus.textContent = `อ่านเสร็จแล้ว ${results.length} รูป ตรวจเลขก่อน Upload`;
  uploadBtn.disabled = false;
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadOne(r) {
  const peaInput = document.getElementById('pea-' + r.idx);
  const pea = clean(peaInput.value);
  if (!pea) throw new Error('ไม่มีเลข PEA');

  const base64 = await fileToBase64(r.file);
  const payload = {
    pea,
    originalName: r.file.name,
    mimeType: r.file.type || 'image/jpeg',
    imageBase64: base64,
    status: r.status,
    barcode: r.barcode || '',
    ocr: r.ocr || '',
    candidates: r.candidates || []
  };

  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });

  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Upload error');
  return json;
}

uploadBtn.addEventListener('click', async () => {
  if (!results.length) {
    alert('กดอ่าน Barcode/OCR ก่อน');
    return;
  }

  uploadBtn.disabled = true;
  scanBtn.disabled = true;
  let ok = 0;
  let fail = 0;

  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    const el = document.getElementById('up-' + r.idx);
    mainStatus.textContent = `กำลัง Upload ${i+1}/${results.length}`;

    try {
      await uploadOne(r);
      ok++;
      el.innerHTML = '✅ Upload แล้ว';
      el.style.color = '#22c55e';
    } catch(err) {
      fail++;
      el.innerHTML = '❌ ' + err.message;
      el.style.color = '#ef4444';
    }
  }

  mainStatus.textContent = `Upload เสร็จ สำเร็จ ${ok} รูป / ไม่สำเร็จ ${fail} รูป`;
  uploadBtn.disabled = false;
  scanBtn.disabled = false;
  alert(`Upload เสร็จ\nสำเร็จ: ${ok}\nไม่สำเร็จ: ${fail}`);
});
</script>
</body>
</html>
